name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: build
        run: |
            docker compose up -d --build

      - name: healthcheck container
        run: |
          sleep 6
          docker ps | grep portfolio
          docker logs portfolio

